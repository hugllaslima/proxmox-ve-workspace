apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: my-app-route
  namespace: my-app-namespace
spec:
  parentRefs:
  - name: cluster-gateway
    namespace: networking
  hostnames:
  - "app.example.local"
  rules:
  - backendRefs:
    - name: my-app-service
      port: 80 # Porta do Service da sua aplicação